<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        table {
            border-collapse: collapse;
            width: 60%;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        caption {
            caption-side: top;
            font-size: 22px;
            font-weight: bold;
            margin: 10px;
        }
    </style>
</head>
<body>

    <table>
        <caption>My Details</caption>
        <tr>
            <th>Name</th>
            <th>Standard</th>
            <th>Phone Number</th>
            <th>Place</th>
        </tr>
        <tr>
            <td>Afrith</td>
            <td>11</td>
            <td>8015962940</td>
            <td>Solapuram</td>
        </tr>
    </table>

</body>
</html>
